{% load static %}
<div class="account-page">
      <div class="container">
            <div class="row">

                <div class="col-2"><!--1 column for image and other for form-->
                    <img src="{% static 'images/image1.png' %}">
                </div>
                
                <div class="col-2">
                    {% if messages %}
                    <div class="message-container">
                        {% for message in messages %}
                            <li class="{{ message.tags }}">{{ message }}</li>
                        {% endfor %}
                    </div>
                    {% endif %}
                    <div class="form-container"><!--column for form-->
                        <div class="form-btn"><!--button for login and register-->
                            <span onclick="login()">Login</span><!--use js-->
                            <span onclick="register()">Register</span>
                            <hr id="Indicator"><!--red orange bar-->
                        </div>

                        <form id="LoginForm" method="post" enctype="multipart/form-data"><!--login form-->
                            {% csrf_token %}
                            <input type="text" name="username" maxlength="10" minlength="3" required placeholder="Username">
                            <input type="password" name="password" required minlength="6" placeholder="Password">
                            <button type="Submit" name="login" class="btn">Login</button>
                            <a href="">Forgot Password?</a>
                        </form>

                        <form id="RegForm" method="post" enctype="multipart/form-data"><!--registraition form-->
                            {% csrf_token %}
                            <input type="text" name="username" maxlength="10" minlength="3" required placeholder="Username">
                            <input type="email" name="email" required placeholder="Email">
                            <input type="password" name="password" required minlength="6" placeholder="Password">
                            <input type="text" name="address" minlength="5" required placeholder="Address">
                            <input type="text" name="phone" maxlength="10" minlength="10" required placeholder="Phone">
                            <button type="Submit" name="register" class="btn">Register</button>
                        </form>


                    </div>
                </div>
                </div>

            </div>
        </div>
